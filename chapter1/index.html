<!DOCTYPE html>
<html>
<head>
    <title>Chapter 1</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        img {
            width: 80%;
            max-width: 800px;
        }
        button {
            margin: 20px;
            padding: 10px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Chapter 1</h1>

<img id="comicPage" src="CH1page0.png">

<br>

<button onclick="prevPage()">Previous</button>
<button onclick="nextPage()">Next</button>

<br><br>
<a href="../chapters.html" style="color:cyan;">Back to Chapters</a>

<script>
let currentPage = 1;
let totalPages = 3; // CHANGE THIS

function updatePage() {
    document.getElementById("comicPage").src = "CH1page" + currentPage + ".png";
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        updatePage();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        updatePage();
    }
}
</script>

</body>
</html>
